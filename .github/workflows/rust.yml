name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Run tests with debug_tokens
      run: cargo test --features debug_tokens --verbose
    - name: Run tests with async_io
      run: cargo test --lib --features async_io --verbose
    - name: Run tests with sys_time
      run: cargo test --features sys_time tests::sys_time_tests --verbose
    - name: Run tests with sys_time and async_io
      run: cargo test --lib --features sys_time --features async_io tests::sys_time_tests --verbose
